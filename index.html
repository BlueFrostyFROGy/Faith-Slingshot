<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faith Flight Frenzy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="hud-top">
        <h1>Faith Flight Frenzy</h1>
        <div class="distance-pill">Distance: <span id="distanceValue">0</span> m</div>
        <div class="distance-pill high-score-pill">High Score: <span id="highScoreValue">0</span> m</div>
        <span id="abilityHint" class="hud-ability">Press Space for ability</span>
        <span id="runStateLabel" class="hud-state">Click &amp; drag to aim</span>
        <button id="changeCharBtn" class="btn btn-secondary">Change Character</button>
        <button id="restartBtn" class="btn btn-secondary">Restart Run</button>
      </header>

      <main>
        <canvas id="gameCanvas" width="1280" height="720"></canvas>

        <section id="menuScreen" class="overlay active">
          <div class="panel">
            <h2>Launch Day</h2>
            <p>Pick a Faith Student, set angle and power, then launch from the catapult.</p>
            <button id="toSelectBtn" class="btn btn-primary">Start</button>
          </div>
        </section>

        <section id="characterScreen" class="overlay">
          <div class="panel large">
            <h2>Character Select</h2>
            <div id="characterGrid" class="character-grid"></div>
            <div class="actions">
              <button id="backToMenuBtn" class="btn btn-secondary">Back</button>
              <button id="playBtn" class="btn btn-primary">Play</button>
            </div>
          </div>
        </section>

        <section id="controlsPanel" class="controls hidden">
          <label>
            Angle: <span id="angleLabel">45</span>°
            <input id="angleSlider" type="range" min="15" max="80" value="45" />
          </label>
          <label>
            Power: <span id="powerLabel">65</span>%
            <input id="powerSlider" type="range" min="25" max="100" value="65" />
          </label>
          <button id="launchBtn" class="btn btn-primary">Launch</button>
          <p id="abilityHint">Press Space for special ability</p>
          <p id="runStateLabel" class="run-state">Ready to launch</p>
        </section>
      </main>
    </div>

    <script src="game.js"></script>
  </body>
</html>
